<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>じゃんけんオンライン</title>
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#fdf6ec;--ink:#1a1209;--red:#e8331c;--blue:#1c5ce8;--yellow:#f5c842;--green:#1cb85c;--card:#fff8f0;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--bg);color:var(--ink);font-family:'Zen Maru Gothic',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;background-image:repeating-linear-gradient(0deg,transparent,transparent 39px,rgba(0,0,0,.04) 39px,rgba(0,0,0,.04) 40px),repeating-linear-gradient(90deg,transparent,transparent 39px,rgba(0,0,0,.04) 39px,rgba(0,0,0,.04) 40px);}
  h1{font-size:clamp(1.8rem,5vw,3rem);font-weight:900;text-align:center;margin-bottom:24px;}
  h1 span{display:inline-block;padding:2px 12px;background:var(--yellow);transform:rotate(-1deg);border:3px solid var(--ink);}
  .screen{display:none;flex-direction:column;align-items:center;gap:16px;width:100%;max-width:440px;}
  .screen.active{display:flex;}
  .input-box{width:100%;padding:14px 18px;border:3px solid var(--ink);background:var(--card);font-family:inherit;font-size:1.1rem;font-weight:700;box-shadow:4px 4px 0 var(--ink);outline:none;}
  .input-box:focus{background:#fffde0;}
  .btn{width:100%;padding:14px;border:3px solid var(--ink);cursor:pointer;font-family:inherit;font-weight:900;font-size:1.1rem;box-shadow:5px 5px 0 var(--ink);transition:transform .1s,box-shadow .1s;background:var(--yellow);}
  .btn:hover{transform:translate(-2px,-2px);box-shadow:7px 7px 0 var(--ink);}
  .btn:active{transform:translate(3px,3px);box-shadow:2px 2px 0 var(--ink);}
  .btn.blue{background:#cce0ff;}.btn.red{background:#ffd0cc;}.btn.green{background:#ccffe0;}
  .config-box{width:100%;border:3px solid var(--ink);background:var(--card);padding:20px;box-shadow:5px 5px 0 var(--ink);}
  .config-box h2{font-size:1rem;font-weight:900;margin-bottom:12px;}
  .config-box p{font-size:.8rem;opacity:.6;margin-bottom:12px;line-height:1.6;}
  .config-box .input-box{margin-bottom:10px;font-size:.85rem;padding:10px 14px;}
  .hint{background:#fffde0;border:2px solid var(--ink);padding:12px 16px;font-size:.8rem;line-height:1.7;width:100%;}
  .hint strong{font-weight:900;}.hint a{color:var(--blue);}
  .waiting-box{border:3px solid var(--ink);background:var(--card);padding:32px 40px;text-align:center;box-shadow:6px 6px 0 var(--ink);width:100%;}
  .waiting-box .big{font-size:3rem;}
  .waiting-box p{margin-top:12px;font-weight:700;opacity:.7;}
  @keyframes spin{to{transform:rotate(360deg);}}
  .spinner{display:inline-block;animation:spin 1.2s linear infinite;}
  .total-stats{display:flex;gap:10px;width:100%;}
  .stat-card{flex:1;border:3px solid var(--ink);background:var(--card);padding:8px 6px;text-align:center;box-shadow:3px 3px 0 var(--ink);}
  .stat-card .s-label{font-size:.65rem;font-weight:700;opacity:.55;}
  .stat-card .s-num{font-size:1.5rem;font-weight:900;}
  .stat-card.s-win .s-num{color:var(--blue);}.stat-card.s-lose .s-num{color:var(--red);}
  .players-row{display:flex;justify-content:space-between;width:100%;gap:12px;}
  .player-card{flex:1;border:3px solid var(--ink);background:var(--card);padding:12px;text-align:center;box-shadow:4px 4px 0 var(--ink);}
  .player-card .name{font-weight:900;font-size:1rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .player-card .hand-emoji{font-size:2.8rem;min-height:52px;display:flex;align-items:center;justify-content:center;}
  .player-card .score{font-size:1.6rem;font-weight:900;}
  .player-card.me{border-color:var(--blue);box-shadow:4px 4px 0 var(--blue);}
  .player-card.opp{border-color:var(--red);box-shadow:4px 4px 0 var(--red);}
  .vs-badge{font-size:1.4rem;font-weight:900;opacity:.3;align-self:center;}
  .result-msg{font-size:clamp(1.3rem,4vw,1.8rem);font-weight:900;text-align:center;min-height:48px;display:flex;align-items:center;justify-content:center;}
  .result-msg.win{color:var(--blue);}.result-msg.lose{color:var(--red);}
  .choices{display:flex;gap:12px;justify-content:center;width:100%;}
  .choice-btn{flex:1;max-width:110px;aspect-ratio:1;border:3px solid var(--ink);background:var(--card);cursor:pointer;font-size:2.2rem;display:flex;flex-direction:column;align-items:center;justify-content:center;box-shadow:4px 4px 0 var(--ink);transition:transform .1s,box-shadow .1s;font-family:inherit;}
  .choice-btn small{font-size:.65rem;font-weight:700;}
  .choice-btn:hover:not(:disabled){transform:translate(-2px,-2px);box-shadow:6px 6px 0 var(--ink);}
  .choice-btn:active:not(:disabled){transform:translate(3px,3px);box-shadow:1px 1px 0 var(--ink);}
  .choice-btn:disabled{opacity:.4;cursor:not-allowed;}
  .choice-btn.gu{background:#fff0f0;}.choice-btn.choki{background:#f0fff0;}.choice-btn.pa{background:#f0f0ff;}
  .choice-btn.selected{border-width:4px;transform:translate(-2px,-2px);}
  .status-text{font-weight:700;opacity:.6;font-size:.95rem;text-align:center;min-height:1.4em;}
  .round-info{font-weight:900;font-size:.9rem;opacity:.5;letter-spacing:.08em;}
  .timeout-label{font-size:.8rem;font-weight:900;color:var(--red);text-align:right;width:100%;min-height:1.2em;}
  .timeout-bar-wrap{width:100%;height:8px;background:#e8d8c8;border:2px solid var(--ink);overflow:hidden;}
  .timeout-bar{height:100%;background:var(--red);width:100%;}
  @keyframes pop{0%{transform:scale(.8);}60%{transform:scale(1.2);}100%{transform:scale(1);}}
  .pop{animation:pop .35s ease-out;}
  .final-box{border:3px solid var(--ink);background:var(--card);padding:32px 40px;text-align:center;box-shadow:6px 6px 0 var(--ink);width:100%;}
  .final-box .big{font-size:4rem;}.final-box .title{font-size:1.6rem;font-weight:900;margin-top:12px;}
  .final-box .sub{margin-top:8px;opacity:.6;font-weight:700;}
  .final-box .total{margin-top:14px;font-size:.85rem;font-weight:700;padding-top:12px;border-top:2px dashed rgba(0,0,0,.15);}
</style>
</head>
<body>
<h1><span>じゃんけん&#x1F590;&#xFE0F;</span><br>&#x30AA;&#x30F3;&#x30E9;&#x30A4;&#x30F3;</h1>

<!-- SETUP -->
<div class="screen active" id="screen-setup">
  <div class="hint"><strong>初回のみ：</strong>Firebase設定が必要です。<br><a href="https://console.firebase.google.com/" target="_blank">Firebase Console</a>でプロジェクトを確認してください。</div>
  <div class="config-box">
    <h2>&#x1F527; Firebase 設定</h2>
    <p>Firebase Console → プロジェクト設定 → マイアプリ → SDK設定から値をコピーしてください</p>
    <input class="input-box" id="cfg-apiKey" placeholder="apiKey"/>
    <input class="input-box" id="cfg-projectId" placeholder="projectId"/>
    <input class="input-box" id="cfg-dbUrl" placeholder="databaseURL (https://xxx.firebaseio.com)"/>
  </div>
  <button class="btn" onclick="saveConfig()">&#x2705; 設定を保存して続ける</button>
</div>

<!-- LOGIN -->
<div class="screen" id="screen-login">
  <div class="total-stats">
    <div class="stat-card s-win"><div class="s-label">通算勝利</div><div class="s-num" id="total-wins">0</div></div>
    <div class="stat-card"><div class="s-label">通算引分</div><div class="s-num" id="total-draws">0</div></div>
    <div class="stat-card s-lose"><div class="s-label">通算敗北</div><div class="s-num" id="total-losses">0</div></div>
  </div>
  <input class="input-box" id="name-input" type="text" placeholder="あなたの名前を入力" maxlength="16"/>
  <button class="btn" onclick="startMatch()">&#x25B6; マッチング開始</button>
  <button class="btn blue" onclick="resetConfig()" style="font-size:.85rem;padding:10px;">&#x2699;&#xFE0F; Firebase設定を変更</button>
</div>

<!-- WAITING -->
<div class="screen" id="screen-waiting">
  <div class="waiting-box">
    <div class="big"><span class="spinner">&#x23F3;</span></div>
    <p>対戦相手を探しています…</p>
    <p id="wait-name" style="margin-top:8px;font-size:1.1rem;font-weight:900;"></p>
  </div>
  <button class="btn red" onclick="cancelMatch()">キャンセル</button>
</div>

<!-- GAME -->
<div class="screen" id="screen-game">
  <div class="round-info" id="round-info">ROUND 1 / 3</div>
  <div class="players-row">
    <div class="player-card me">
      <div class="name" id="my-name">あなた</div>
      <div class="hand-emoji" id="my-hand">&#x1F91C;</div>
      <div class="score" id="my-score">0</div>
    </div>
    <div class="vs-badge">VS</div>
    <div class="player-card opp">
      <div class="name" id="opp-name">相手</div>
      <div class="hand-emoji" id="opp-hand">&#x1F91B;</div>
      <div class="score" id="opp-score">0</div>
    </div>
  </div>
  <div class="result-msg" id="result-msg">手を選んでください</div>
  <div class="status-text" id="status-text"></div>
  <div class="timeout-label" id="timeout-label"></div>
  <div class="timeout-bar-wrap" id="timeout-bar-wrap" style="display:none"><div class="timeout-bar" id="timeout-bar"></div></div>
  <div class="choices">
    <button class="choice-btn gu" onclick="sendChoice('gu')">&#x270A;<small>グー</small></button>
    <button class="choice-btn choki" onclick="sendChoice('choki')">&#x270C;&#xFE0F;<small>チョキ</small></button>
    <button class="choice-btn pa" onclick="sendChoice('pa')">&#x1F590;&#xFE0F;<small>パー</small></button>
  </div>
  <button class="btn red" style="margin-top:8px" onclick="leaveGame()">退出</button>
</div>

<!-- RESULT -->
<div class="screen" id="screen-result">
  <div class="final-box" id="final-box">
    <div class="big" id="final-emoji">&#x1F3C6;</div>
    <div class="title" id="final-title"></div>
    <div class="sub" id="final-score"></div>
    <div class="total" id="final-total"></div>
  </div>
  <button class="btn green" onclick="playAgain()">もう一度！</button>
  <button class="btn blue" onclick="goHome()">トップに戻る</button>
</div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js';
import {
  getDatabase, ref, set, get, push, onValue, off, remove, update, serverTimestamp
} from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js';

const HANDS={gu:'✊',choki:'✌️',pa:'🖐️'};
const BEATS={gu:'choki',choki:'pa',pa:'gu'};
const MAX_ROUNDS=3, TIMEOUT_SEC=20; // ① 20秒に変更
const DEFAULT_FB={
  apiKey:'AIzaSyAXqVEP5N3fqRgdqpyugfBIrReKFUqakOQ',
  projectId:'jankenmachine',
  dbUrl:'https://jankenmachine-default-rtdb.firebaseio.com/'
};

let db=null, myId=null, myName='';
let myRole=null, roomId=null;
let round=1, myScore=0, oppScore=0, chosen=false;
let gameStarted=false, resolvedRounds=new Set(), finalShown=false;
let currentChoiceKey=null;
let timeoutTimer=null; // ③ カウントダウン表示は消すがタイマーは残す
let totalWins=0, totalDraws=0, totalLosses=0;
let roomUnsub=null;

// ── UI ──────────────────────────────────────────
function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}
function enableChoices() {document.querySelectorAll('.choice-btn').forEach(b=>b.disabled=false);}
function disableChoices(){document.querySelectorAll('.choice-btn').forEach(b=>b.disabled=true);}
function updateRoundDisplay(){
  document.getElementById('round-info').textContent='ROUND '+Math.min(round,MAX_ROUNDS)+' / '+MAX_ROUNDS;
}
function pop(id){
  const el=document.getElementById(id);
  el.classList.remove('pop'); void el.offsetWidth; el.classList.add('pop');
  setTimeout(()=>el.classList.remove('pop'),400);
}
function resetPlayAgainBtn(){
  const btn=document.querySelector('#screen-result .btn.green');
  if(btn){btn.disabled=false; btn.textContent='もう一度！';}
}

// ── 通算成績 ─────────────────────────────────────
function loadTotalStats(){
  totalWins  =parseInt(localStorage.getItem('total_wins')  ||'0');
  totalDraws =parseInt(localStorage.getItem('total_draws') ||'0');
  totalLosses=parseInt(localStorage.getItem('total_losses')||'0');
  renderStats();
}
function saveStats(){
  localStorage.setItem('total_wins',  totalWins);
  localStorage.setItem('total_draws', totalDraws);
  localStorage.setItem('total_losses',totalLosses);
  renderStats();
}
function renderStats(){
  document.getElementById('total-wins').textContent  =totalWins;
  document.getElementById('total-draws').textContent =totalDraws;
  document.getElementById('total-losses').textContent=totalLosses;
}

// ── タイムアウト（③ カウントダウン表示なし、20秒で退出のみ）──
function startTimeout(){
  stopTimeout();
  // バーと秒数は表示しない（③ 無効化）
  timeoutTimer=setTimeout(()=>{
    window.leaveGame();
  }, TIMEOUT_SEC*1000);
}
function stopTimeout(){
  clearTimeout(timeoutTimer);
  timeoutTimer=null;
}

// ── Firebase設定 ──────────────────────────────────
window.saveConfig=function(){
  const a=document.getElementById('cfg-apiKey').value.trim();
  const p=document.getElementById('cfg-projectId').value.trim();
  const d=document.getElementById('cfg-dbUrl').value.trim();
  if(!a||!p||!d){alert('すべての項目を入力してください');return;}
  localStorage.setItem('fb_apiKey',a); localStorage.setItem('fb_projectId',p); localStorage.setItem('fb_dbUrl',d);
  initFirebase(a,p,d); loadTotalStats(); showScreen('screen-login');
};
window.resetConfig=function(){
  ['fb_apiKey','fb_projectId','fb_dbUrl'].forEach(k=>localStorage.removeItem(k));
  document.getElementById('cfg-apiKey').value   =DEFAULT_FB.apiKey;
  document.getElementById('cfg-projectId').value=DEFAULT_FB.projectId;
  document.getElementById('cfg-dbUrl').value    =DEFAULT_FB.dbUrl;
  showScreen('screen-setup');
};
function initFirebase(apiKey,projectId,databaseURL){
  try{
    const app=initializeApp({apiKey,projectId,databaseURL},'janken-'+Date.now());
    db=getDatabase(app);
    myId='p_'+Math.random().toString(36).slice(2,10);
  }catch(e){alert('Firebase初期化エラー: '+e.message);}
}
{
  const a=localStorage.getItem('fb_apiKey')||DEFAULT_FB.apiKey;
  const p=localStorage.getItem('fb_projectId')||DEFAULT_FB.projectId;
  const d=localStorage.getItem('fb_dbUrl')||DEFAULT_FB.dbUrl;
  document.getElementById('cfg-apiKey').value   =a;
  document.getElementById('cfg-projectId').value=p;
  document.getElementById('cfg-dbUrl').value    =d;
  localStorage.setItem('fb_apiKey',a); localStorage.setItem('fb_projectId',p); localStorage.setItem('fb_dbUrl',d);
  initFirebase(a,p,d); loadTotalStats(); showScreen('screen-login');
}

// ── マッチング ────────────────────────────────────
window.startMatch=function(){
  myName=document.getElementById('name-input').value.trim();
  if(!myName){alert('名前を入力してください');return;}
  if(!db){alert('Firebase設定が必要です');return;}
  document.getElementById('wait-name').textContent=myName+' でマッチング中';
  showScreen('screen-waiting');
  findMatch();
};
window.cancelMatch=function(){
  stopRoomListener();
  if(myRole===null){
    removeFromQueue();
    remove(ref(db,'notify/'+myId)).catch(()=>{});
  }
  roomId=null; showScreen('screen-login');
};
async function removeFromQueue(){
  const snap=await get(ref(db,'queue'));
  if(snap.exists()) snap.forEach(c=>{if(c.val().playerId===myId) remove(ref(db,'queue/'+c.key));});
}
async function findMatch(){
  const qSnap=await get(ref(db,'queue'));
  let waiting=null;
  if(qSnap.exists()) qSnap.forEach(c=>{if(!waiting&&c.val().playerId!==myId) waiting={key:c.key,...c.val()};});
  if(waiting){
    await remove(ref(db,'queue/'+waiting.key));
    roomId='room_'+Date.now()+'_'+Math.random().toString(36).slice(2,6);
    myRole='p2';
    await set(ref(db,'rooms/'+roomId),{
      p1:{name:waiting.name,id:waiting.playerId},
      p2:{name:myName,id:myId},
      status:'playing', createdAt:serverTimestamp()
    });
    startGame();
  }else{
    myRole=null;
    const qRef=await push(ref(db,'queue'),{name:myName,playerId:myId,joinedAt:serverTimestamp()});
    const qKey=qRef.key;
    const notifyRef=ref(db,'notify/'+myId);
    const notifyUnsub=onValue(notifyRef,async snap=>{
      if(!snap.exists()) return;
      const data=snap.val();
      if(data.roomId){
        off(notifyRef);
        await remove(ref(db,'queue/'+qKey)).catch(()=>{});
        await remove(notifyRef).catch(()=>{});
        roomId=data.roomId; myRole='p1';
        startGame();
      }
    });
  }
}

// ── ゲーム開始 ────────────────────────────────────
async function startGame(){
  if(myRole==='p2'){
    const snap=await get(ref(db,'rooms/'+roomId));
    const p1Id=snap.val()?.p1?.id;
    if(p1Id) await set(ref(db,'notify/'+p1Id),{roomId});
  }
  attachRoomListener(roomId);
}

function stopRoomListener(){
  if(roomUnsub){ roomUnsub(); roomUnsub=null; }
}

function attachRoomListener(targetRoomId){
  stopRoomListener();
  const roomRef=ref(db,'rooms/'+targetRoomId);
  roomUnsub=onValue(roomRef,snap=>{
    if(!snap.exists()){
      stopTimeout();
      alert('相手が退出しました');
      doFullReset(); showScreen('screen-login');
      return;
    }
    handleRoomUpdate(snap.val());
  });
}

// ── ゲーム状態リセット ────────────────────────────
function resetGameState(){
  gameStarted=false; myScore=0; oppScore=0;
  round=1; chosen=false;
  resolvedRounds=new Set(); finalShown=false;
  currentChoiceKey=null;
  stopTimeout();
}
function doFullReset(){
  stopRoomListener(); resetGameState();
  roomId=null; myRole=null;
  loadTotalStats(); resetPlayAgainBtn();
}

// ── ゲーム処理 ────────────────────────────────────
function handleRoomUpdate(room){
  const oppRole=myRole==='p1'?'p2':'p1';
  if(!room[myRole]||!room[oppRole]) return;

  if(room.status==='finished'&&room.winner!==undefined&&!finalShown){
    finalShown=true; stopTimeout();
    setTimeout(()=>showFinalResult(room),500);
    return;
  }

  if(!gameStarted){
    gameStarted=true;
    document.getElementById('my-name').textContent  =myName;
    document.getElementById('opp-name').textContent =room[oppRole].name;
    document.getElementById('my-score').textContent =0;
    document.getElementById('opp-score').textContent=0;
    document.getElementById('my-hand').textContent  ='🤜';
    document.getElementById('opp-hand').textContent ='🤛';
    document.getElementById('result-msg').textContent='手を選んでください';
    document.getElementById('result-msg').className ='result-msg';
    document.getElementById('status-text').textContent='';
    currentChoiceKey='0';
    updateRoundDisplay(); enableChoices(); startTimeout();
    showScreen('screen-game');
  }

  // ② あいこ再試合：DB上のdrawRoundフラグを見て手を受け付ける
  // drawRound が存在する場合、そのキーで手を書く（両者同じキーを使う）
  if(room.drawRound!==undefined&&room.drawRound!==null){
    const drawKey='draw_'+room.drawRound;
    // まだ処理していないdrawKeyで、自分がまだ選んでいなければUIを有効化
    if(!resolvedRounds.has(drawKey)&&currentChoiceKey!==drawKey){
      currentChoiceKey=drawKey; chosen=false;
      enableChoices(); startTimeout();
      document.getElementById('result-msg').textContent='もう一度じゃんけん！';
      document.getElementById('result-msg').className='result-msg';
      document.getElementById('my-hand').textContent='🤜';
      document.getElementById('opp-hand').textContent='🤛';
      document.querySelectorAll('.choice-btn').forEach(b=>b.classList.remove('selected'));
      document.getElementById('status-text').textContent='';
    }
  }

  if(!room.choices) return;
  Object.entries(room.choices).forEach(([key,choices])=>{
    if(choices.p1&&choices.p2&&!resolvedRounds.has(key)){
      resolvedRounds.add(key); resolveRound(choices.p1,choices.p2,key);
    }else if(choices[myRole]&&!choices[oppRole]){
      document.getElementById('status-text').textContent='相手の選択を待っています…';
    }
  });
}

function resolveRound(h1,h2,dbKey){
  const myHand =myRole==='p1'?h1:h2;
  const oppHand=myRole==='p1'?h2:h1;
  document.getElementById('my-hand').textContent =HANDS[myHand];
  document.getElementById('opp-hand').textContent=HANDS[oppHand];
  pop('my-hand'); pop('opp-hand');
  document.getElementById('status-text').textContent='';
  disableChoices(); stopTimeout();

  const isDraw=(myHand===oppHand);
  const isWin =!isDraw&&BEATS[myHand]===oppHand;
  if(!isDraw){
    if(isWin) myScore++; else oppScore++;
    document.getElementById('my-score').textContent =myScore;
    document.getElementById('opp-score').textContent=oppScore;
  }

  if(isDraw){
    document.getElementById('result-msg').textContent='🤝 あいこ！';
    document.getElementById('result-msg').className='result-msg';
  }else if(isWin){
    document.getElementById('result-msg').textContent='🎉 この局はあなたの勝ち！';
    document.getElementById('result-msg').className='result-msg win';
  }else{
    document.getElementById('result-msg').textContent='😢 この局は相手の勝ち…';
    document.getElementById('result-msg').className='result-msg lose';
  }

  if(isDraw){
    // ② あいこ：p1がDB上のdrawRoundフラグをインクリメントして両者に伝達
    // drawRoundはラウンド番号×1000＋連番（同ラウンド複数あいこに対応）
    if(myRole==='p1'){
      setTimeout(async()=>{
        // drawRoundを現在値+1（なければ round*1000+1）
        const snap=await get(ref(db,'rooms/'+roomId+'/drawRound'));
        const prev=snap.exists()?snap.val():0;
        const next=Math.floor(prev/1000)===round ? prev+1 : round*1000+1;
        await set(ref(db,'rooms/'+roomId+'/drawRound'),next);
        // currentChoiceKeyは handleRoomUpdate の drawRound 検知時に設定される
      },1800);
    }
    // p2はhandleRoomUpdateのdrawRound検知で自動的にUIが有効化される
  }else{
    round++; updateRoundDisplay();
    if(round<=MAX_ROUNDS){
      setTimeout(()=>{
        document.getElementById('result-msg').textContent='手を選んでください';
        document.getElementById('result-msg').className='result-msg';
        document.getElementById('my-hand').textContent='🤜';
        document.getElementById('opp-hand').textContent='🤛';
        document.querySelectorAll('.choice-btn').forEach(b=>b.classList.remove('selected'));
        // drawRoundをリセット（次ラウンンドのあいこに備える）
        if(myRole==='p1') update(ref(db,'rooms/'+roomId),{drawRound:null}).catch(()=>{});
        currentChoiceKey=String(round-1); chosen=false; enableChoices(); startTimeout();
      },1800);
    }else{
      if(myRole==='p1'){
        const winner=myScore>oppScore?'p1':oppScore>myScore?'p2':'draw';
        update(ref(db,'rooms/'+roomId),{status:'finished',winner,finalScore:{p1:myScore,p2:oppScore}});
      }
    }
  }
}

window.sendChoice=function(hand){
  if(chosen||!db||!roomId||!currentChoiceKey) return;
  chosen=true; disableChoices(); stopTimeout();
  document.querySelectorAll('.choice-btn').forEach(b=>b.classList.remove('selected'));
  document.querySelectorAll('.choice-btn')[['gu','choki','pa'].indexOf(hand)].classList.add('selected');
  document.getElementById('my-hand').textContent=HANDS[hand];
  update(ref(db,'rooms/'+roomId+'/choices/'+currentChoiceKey),{[myRole]:hand});
};

function showFinalResult(room){
  if(!document.getElementById('screen-game').classList.contains('active')) return;
  const oppRole=myRole==='p1'?'p2':'p1';
  const box=document.getElementById('final-box');
  const winner=room.winner;
  if(winner===myRole){totalWins++;document.getElementById('final-emoji').textContent='🏆';document.getElementById('final-title').textContent='あなたの勝ち！';box.style.background='#ccffdd';}
  else if(winner==='draw'){totalDraws++;document.getElementById('final-emoji').textContent='🤝';document.getElementById('final-title').textContent='引き分け！';box.style.background='#fffde0';}
  else{totalLosses++;document.getElementById('final-emoji').textContent='😢';document.getElementById('final-title').textContent=(room[oppRole]?.name||'相手')+' の勝ち…';box.style.background='#ffd0cc';}
  saveStats();
  document.getElementById('final-score').textContent=myScore+' - '+oppScore;
  document.getElementById('final-total').textContent='通算: '+totalWins+'勝 '+totalDraws+'引 '+totalLosses+'敗';
  resetPlayAgainBtn();
  showScreen('screen-result');
  stopRoomListener();
  const savedRoomId=roomId;
  setTimeout(()=>remove(ref(db,'rooms/'+savedRoomId)).catch(()=>{}),30000);
}

// ── もう一度 ──────────────────────────────────────
window.playAgain=async function(){
  const btn=document.querySelector('#screen-result .btn.green');
  btn.disabled=true; btn.textContent='相手を待っています…';

  const oldRoomId=roomId;
  const oldMyRole=myRole;

  await update(ref(db,'rooms/'+oldRoomId+'/ready'),{[oldMyRole]:true}).catch(()=>{});

  // 20秒待っても相手が押さなければ退出
  const waitTimer=setTimeout(()=>{
    off(checkRef);
    doFullReset();
    showScreen('screen-login');
  }, 20000);

  const checkRef=ref(db,'rooms/'+oldRoomId+'/ready');
  const checkUnsub=onValue(checkRef,async snap=>{
    if(!snap.exists()) return;
    const ready=snap.val();
    if(!ready.p1||!ready.p2) return;
    off(checkRef);

    if(oldMyRole==='p1'){
      const snap2=await get(ref(db,'rooms/'+oldRoomId));
      if(!snap2.exists()) return;
      const oldRoom=snap2.val();
      const newRoomId='room_'+Date.now()+'_'+Math.random().toString(36).slice(2,6);
      await set(ref(db,'rooms/'+newRoomId),{
        p1:{name:oldRoom.p1.name,id:oldRoom.p1.id},
        p2:{name:oldRoom.p2.name,id:oldRoom.p2.id},
        status:'playing', createdAt:serverTimestamp()
      });
      await set(ref(db,'notify2/'+oldRoom.p1.id),{roomId:newRoomId,role:'p1'});
      await set(ref(db,'notify2/'+oldRoom.p2.id),{roomId:newRoomId,role:'p2'});
    }

    const myNotify2=ref(db,'notify2/'+myId);
    const n2Unsub=onValue(myNotify2,async snap=>{
      if(!snap.exists()) return;
      const data=snap.val();
      if(!data.roomId) return;
      off(myNotify2);
      remove(myNotify2).catch(()=>{});
      resetGameState();
      roomId=data.roomId;
      myRole=data.role;
      resetPlayAgainBtn();
      await startGame();
    });
  });
};

window.leaveGame=function(){
  const old=roomId;
  doFullReset();
  if(old) remove(ref(db,'rooms/'+old)).catch(()=>{});
  showScreen('screen-login');
};
window.goHome=function(){
  const old=roomId;
  doFullReset();
  if(old) remove(ref(db,'rooms/'+old)).catch(()=>{});
  showScreen('screen-login');
};

document.getElementById('name-input').addEventListener('keydown',e=>{if(e.key==='Enter')window.startMatch();});
</script>
